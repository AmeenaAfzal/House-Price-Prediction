<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; text-align: center; font-size: 18px; font-weight: bold; border-radius: 5px; color: #333; }
        .debug-warning { color: red; font-size: 12px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 House Price Predictor</h2>
    
    <form action="/predict" method="post">
        <div class="form-group">
            <label>Overall Quality (1-10):</label>
            <input type="number" name="overall_qual" min="1" max="10" value="{{ request.form.get('overall_qual', '7') }}" required>
        </div>
        
        <div class="form-group">
            <label>Above Grade Living Area (sq ft):</label>
            <input type="number" name="gr_liv_area" value="{{ request.form.get('gr_liv_area', '2000') }}" required>
        </div>
        
        <div class="form-group">
            <label>Total Basement Area (sq ft):</label>
            <input type="number" name="total_bsmt_sf" value="{{ request.form.get('total_bsmt_sf', '1000') }}" required>
        </div>
        
        <div class="form-group">
            <label>Garage Capacity (Cars):</label>
            <input type="number" name="garage_cars" min="0" max="5" value="{{ request.form.get('garage_cars', '2') }}" required>
        </div>
        
        <div class="form-group">
            <label>Year Built:</label>
            <input type="number" name="year_built" value="{{ request.form.get('year_built', '2003') }}" required>
        </div>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}
    
    {% if debug_text %}
        <div class="debug-warning">
            <b>Debug Info:</b> {{ debug_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
